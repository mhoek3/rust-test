<form id="term_form">
    <div class="form-group">
        <label for="name">Term Name</label>
        <input type="text" name="name" id="name" placeholder="Enter term name">
    </div>

    <div class="form-group">
        <label for="details">Details</label>
        <textarea name="details" id="details" cols="10" placeholder="Enter details"></textarea>
    </div>

    <div class="form-group">
        <label for="kinds">Term Kind</label>
        <select name="term_kind" id="kinds">
            <option value="0">No kind</option>
        </select>
    </div>

    <button class="blue" type="submit" id="submit">Save</button>
</form>
